name: Release

# Su push di un tag vX.Y.Z: gate di test veloci, poi build & push delle immagini
# su Docker Hub. Rimuove il single point of failure di `make docker-push` manuale.
on:
  push:
    tags:
      - "v*"

jobs:
  guards:
    name: Unit tests + guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Check backup.sql is aligned with migration head
        run: make check-backup

      - name: Run unit tests
        run: make test-unit

  push-images:
    name: Build & push Docker images
    needs: guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            manzolo/invoice_backend:${{ github.ref_name }}
            manzolo/invoice_backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            manzolo/invoice_frontend:${{ github.ref_name }}
            manzolo/invoice_frontend:latest
